<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>LPの練習</title>
    <meta name="description" content="LP練習" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/ico" href="img/favicon.ico" />
    <!-- リセットCSS -->
    <link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css" />
    <!-- Googleフォント -->
    <link
      href="https://fonts.googleapis.com/
          css?family=Sawarabi+Gothic"
      rel="stylesheet"
    />
    <!-- 自分のCSS -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- ここにコンテンツを書いていく -->
    <header id="header">
      <h1 class="site-title">
        <a href="#">GTCode</a>
      </h1>
      <nav>
        <ul>
          <li><a href="#about">About</a></li>
          <li><a href="#works">Works</a></li>
          <li><a href="#news">News</a></li>
          <li><a href="#contact">Contact</a></li>
          <li>
            <a
              href="https://www.twitter.com/"
              target="_blank"
              rel="noopener noreferrer"
            >
              <img src="./img/twitter.png" alt="Twitter" class="icon" />
            </a>
          </li>
        </ul>
      </nav>
    </header>
    <div id="mainvisual">
      <picture>
        <source media="(max-width: 600px)" srcset="./img/main-sp.jpg" />
        <img src="./img/main-pc.jpg" alt="メインビジュアル" />
      </picture>
    </div>
    <section id="about" class="wrapper">
      <h2 class="sec-title">About</h2>
      <ul>
        <li>GTCode株式会社</li>
        <li>Web制作会社として設立</li>
        <li>Webサイト・アプリ開発を承ります</li>
        <li>メールアドレス：xxxxxxx@xxx.com</li>
      </ul>
      <p>会社の説明文をここに書きます...</p>
    </section>

    <section id="works" class="wrapper">
      <h2 class="sec-title">Works</h2>
      <ul>
        <li><img src="./img/works1.jpg" alt="work1" /></li>
        <li><img src="./img/works2.jpg" alt="work2" /></li>
        <li><img src="./img/works3.jpg" alt="work3" /></li>
        <li><img src="./img/works4.jpg" alt="work4" /></li>
        <li><img src="./img/works5.jpg" alt="work5" /></li>
        <li><img src="./img/works6.jpg" alt="work6" /></li>
        <li><img src="./img/works2.jpg" alt="work7" /></li>
        <li><img src="./img/works4.jpg" alt="work8" /></li>
        <li><img src="./img/works1.jpg" alt="work9" /></li>

        <!-- ... 9枚まで繰り返し -->
        <section id="news" class="wrapper">
          <h2 class="sec-title">News</h2>
          <dl>
            <dt>2022/10/23</dt>
            <dd>本サイトをリリースしました。</dd>
            <dt>2022/10/23</dt>
            <dd>プログラミングチュートリアルを開始。</dd>
            <!-- ... 繰り返し -->
          </dl>
        </section>
        <section id="contact" class="wrapper">
          <h2 class="sec-title">Contact</h2>
          <p>お問い合わせは以下のフォームから</p>
          <form action="#" method="post">
            <dl>
              <dt><label for="name">お名前</label></dt>
              <dd><input type="text" id="name" /></dd>
              <dt><label for="email">メールアドレス</label></dt>
              <dd><input type="email" id="email" /></dd>
              <dt><label for="content">内容</label></dt>
              <dd>
                <textarea id="content" cols="30" rows="10"></textarea>
              </dd>
            </dl>
            <div class="button">
              <input type="submit" value="送信" />
            </div>
          </form>
        </section>
      </ul>
    </section>
  </body>
</html>
